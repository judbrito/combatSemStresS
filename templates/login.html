<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Administrador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Estilos específicos para a página de login */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .login-container {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); /* Efeito neon verde */
        }
        .login-container h2 {
            color: #00FF00; /* Verde neon */
            margin-bottom: 20px;
            text-shadow: 0 0 5px #00FF00;
        }
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #333;
            color: white;
            font-size: 1em;
            box-sizing: border-box; /* Inclui padding na largura */
        }
        .login-container button {
            background-color: #00FF00; /* Verde neon */
            color: #111;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }
        .login-container button:hover {
            background-color: #00AA00; /* Verde mais escuro no hover */
            transform: translateY(-2px);
        }
        .flash-message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        .flash-message.success {
            background-color: #28a745; /* Verde de sucesso */
            color: white;
        }
        .flash-message.danger {
            background-color: #dc3545; /* Vermelho de perigo */
            color: white;
        }
        .flash-message.info {
            background-color: #17a2b8; /* Azul de informação */
            color: white;
        }
        .login-container p {
            margin-top: 15px;
        }
        .login-container a {
            color: #00FF00;
            text-decoration: none;
            transition: color 0.3s;
        }
        .login-container a:hover {
            color: #00AA00;
            text-decoration: underline;
        }

        /* Animação para mensagens flash */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login - Administrador</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required><br>
            <input type="password" name="password" placeholder="Senha" required><br>
            <button type="submit">Entrar</button>
        </form>
        <p><a href="{{ url_for('index') }}">Voltar ao Jogo</a></p>
    </div>
</body>
</html>
