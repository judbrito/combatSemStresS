<!DOCTYPE html>
<html>
<head>
    <title>Jogo dos Emojis</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Jogo dos Emojis</h1>

    <div class="main-container">
        <div id="left-panel" class="panel">
            <div id="login-admin" class="admin-panel">
                <h2>Login Admin</h2>
                <input type="text" id="admin-login" placeholder="Login">
                <input type="password" id="admin-senha" placeholder="Senha">
                <button onclick="loginAdmin()">Login</button>
                <div id="mensagem-admin"></div>
            </div>

            <div id="admin-area" class="admin-panel" style="display: none;">
                <h2>Painel de Administração</h2>
                <label for="num-ganhadores">Número de Ganhadores:</label>
                <input type="number" id="num-ganhadores" onchange="definirGanhadores(this.value)">
                <br><br>

                <h3>Adicionar Participante (Admin)</h3>
                <input type="text" id="novo-nick" placeholder="Nick">
                <input type="text" id="nova-lealdade" placeholder="Lealdade">
                <button onclick="adicionarParticipante()">Adicionar</button>
                <br><br>

                <h3>Gerenciar Ganhadores</h3>
                <div id="lista-ganhadores"></div>
                <button onclick="listarGanhadores()">Listar Ganhadores</button>
                <br>
                <label for="jogador-ganhador">ID do Jogador para adicionar:</label>
                <input type="text" id="jogador-ganhador">
                <button onclick="adicionarGanhador()">Adicionar Ganhador</button>
                <br>
                <label for="indice-ganhador">Índice do Ganhador para excluir:</label>
                <input type="number" id="indice-ganhador">
                <button onclick="excluirGanhador()">Excluir Ganhador</button>
                <br><br>
                <button onclick="definirNovoEmojiAlvo()">Definir Novo Emoji Alvo</button>
            </div>
        </div>

        <div id="middle-panel" class="panel">
            <div id="cadastro">
                <h2>Cadastro</h2>
                <input type="text" id="nick" placeholder="Seu Nick">
                <input type="text" id="lealdade" placeholder="Sua Lealdade (opcional)">
                <button onclick="registrarNick()">Cadastrar</button>
            </div>

            <div>
                <h2>Emoji Alvo</h2>
                <div id="emojis-alvo"></div>
            </div>

            <div>
                <h2>Seus Emojis</h2>
                <div id="emojis-jogador"></div>
                <button onclick="jogar()">Jogar (Espaço ou Clique)</button>
            </div>
        </div>

        <div id="right-panel" class="panel">
            <h2>Participantes Ativos</h2>
            <div id="lista-participantes"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/script.js"></script>
</body>
</html>
